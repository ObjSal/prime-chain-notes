<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chain Notes — Viewer</title>
<style>
  :root { --bg:#101418; --card:#1a2027; --border:#2c3540; --fg:#e8edf2;
          --muted:#8b98a5; --accent:#59a8bd; --danger:#e05d5d; --ok:#5dbd7a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:16px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; }
  main { max-width: 780px; margin: 0 auto; padding: 24px 16px 60px; }
  h1 { font-size: 26px; margin: 8px 0 2px; }
  .sub { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
  section { background:var(--card); border:1px solid var(--border);
            border-radius:14px; padding:18px; margin:16px 0; }
  h2 { font-size:18px; margin:0 0 12px; }
  label { display:block; font-size:13px; color:var(--muted); margin:10px 0 4px; }
  input[type=text], select {
    width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--border);
    background:#11161b; color:var(--fg); font:14px ui-monospace, Menlo, monospace; }
  button { background:var(--accent); color:#fff; border:0; border-radius:10px;
           padding:10px 18px; font-size:15px; font-weight:600; cursor:pointer; margin-top:12px; }
  button.secondary { background:transparent; border:1px solid var(--border); color:var(--fg); }
  button:disabled { opacity:.45; cursor:default; }
  .log { font:13px ui-monospace, Menlo, monospace; white-space:pre-wrap;
         background:#0c1013; border-radius:10px; padding:12px; margin-top:12px;
         max-height:260px; overflow:auto; color:var(--muted); }
  .log .err { color:var(--danger); } .log .ok { color:var(--ok); }
  a { color: var(--accent); }
  .pill { font-size:11px; padding:2px 8px; border-radius:10px; background:#11161b;
          border:1px solid var(--border); color:var(--muted); vertical-align:middle; }
  .note { background:#11161b; border:1px solid var(--border); border-radius:10px;
          padding:12px 14px; margin-top:10px; }
  .note-head { display:flex; gap:8px; align-items:center; flex-wrap:wrap;
               font:13px ui-monospace, Menlo, monospace; color:var(--muted); }
  .note-body { white-space:pre-wrap; overflow-wrap:anywhere; margin:8px 0 6px;
               font:14px ui-monospace, Menlo, monospace; }
  .note-body.enc, .note-body.dim { color:var(--muted); font-style:italic; }
  .note-meta { font-size:12px; color:var(--muted);
               font-family:ui-monospace, Menlo, monospace; overflow-wrap:anywhere; }
</style>
</head>
<body>
<main>
  <h1>Chain Notes — Viewer <span class="pill" id="modePill">static</span></h1>
  <p class="sub">Read-only view of the notes recorded at an address. Public notes
  render as text; private notes stay encrypted — only the device can read them.
  <a href="index.html">← Companion</a></p>

  <section>
    <h2>Address</h2>
    <div class="row">
      <select id="network">
        <option value="mainnet">Mainnet</option>
        <option value="testnet4">Testnet4</option>
        <option value="signet">Signet</option>
        <option value="regtest">Regtest (local server)</option>
      </select>
    </div>
    <label>Notes address (from the device's home screen)</label>
    <input type="text" id="address" placeholder="bc1p… / tb1p… / bcrt1p…" spellcheck="false">
    <button id="loadBtn">Load notes</button>
  </section>

  <section>
    <h2>Notes</h2>
    <p class="sub" id="notesHeader" style="margin-bottom:0">Enter an address and load.</p>
    <div id="notes"></div>
    <div class="log" id="viewLog" style="display:none"></div>
  </section>
</main>

<script>
"use strict";

const API = {
  mainnet:  { base: "https://mempool.space/api",          explorer: "https://mempool.space" },
  testnet4: { base: "https://mempool.space/testnet4/api", explorer: "https://mempool.space/testnet4" },
  signet:   { base: "https://mempool.space/signet/api",   explorer: "https://mempool.space/signet" },
  regtest:  { base: "/regtest/api",                       explorer: null },
};

let serverMode = false;

const $ = (id) => document.getElementById(id);
const net = () => $("network").value;

function log(el, msg, cls) {
  el.style.display = "block";
  const line = document.createElement("div");
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function api(path, opts) {
  const resp = await fetch(API[net()].base + path, opts);
  const text = await resp.text();
  if (!resp.ok) throw new Error(text || resp.statusText);
  return text;
}
const apiJson = async (path) => JSON.parse(await api(path));

/* -------------------------------------------------- OP_RETURN parse */
// scriptPubKey hex → pushed payload hex (single canonical push), or null.
function opReturnPayload(spkHex) {
  const b = spkHex.toLowerCase();
  if (!b.startsWith("6a")) return null;
  let rest = b.slice(2);
  const op = parseInt(rest.slice(0, 2), 16);
  let len, data;
  if (op >= 1 && op <= 75)      { len = op; data = rest.slice(2); }
  else if (op === 0x4c)         { len = parseInt(rest.slice(2, 4), 16); data = rest.slice(4); }
  else if (op === 0x4d)         { len = parseInt(rest.slice(4, 6) + rest.slice(2, 4), 16); data = rest.slice(6); }
  else return null;
  return data.length === len * 2 ? data : null;
}

async function fullHistory(address, logEl) {
  // First page: /txs = up to 50 mempool + first 25 confirmed.
  const txs = await apiJson(`/address/${address}/txs`);
  let confirmed = txs.filter((t) => t.status.confirmed);
  let last = confirmed.length ? confirmed[confirmed.length - 1].txid : null;
  // Paginate the confirmed chain until a short page.
  while (last) {
    const page = await apiJson(`/address/${address}/txs/chain?after_txid=${last}`);
    if (!page.length) break;
    txs.push(...page);
    log(logEl, `  …paged ${page.length} more confirmed txs`);
    last = page.length >= 25 ? page[page.length - 1].txid : null;
  }
  const seen = new Set();
  return txs.filter((t) => !seen.has(t.txid) && seen.add(t.txid));
}

/* --------------------------------------- PNTE envelope (JS port) */
// Mirrors notes-core/src/envelope.rs (FROZEN format):
// PNTE(0-3) || ver=1(4) || flags(5) || note_id(6-9) || seq(10) || total(11) || data(12..)
const FLAG_PRIVATE = 0x01;

const hexToBytes = (h) => Uint8Array.from(h.match(/../g) || [], (b) => parseInt(b, 16));

function decodeEnvelope(b) {
  if (b.length <= 12) return null;
  if (b[0] !== 0x50 || b[1] !== 0x4e || b[2] !== 0x54 || b[3] !== 0x45) return null; // "PNTE"
  if (b[4] !== 1) return null;
  const seq = b[10], total = b[11];
  if (total === 0 || seq >= total) return null;
  let noteId = "";
  for (let i = 6; i < 10; i++) noteId += b[i].toString(16).padStart(2, "0");
  return { flags: b[5], noteId, seq, total, dataHex: null, data: b.slice(12) };
}

// envelope.rs reassemble(), tolerant: instead of erroring on missing/
// inconsistent chunks it reports {partial:{have,total}} so the viewer can
// surface partially-synced notes (the device silently drops them).
function reassemble(chunks) {
  const first = chunks[0];
  const total = first.total;
  const slots = new Array(total).fill(null);
  for (const c of chunks) {
    if (c.total !== total || c.flags !== first.flags) return { partial: { have: chunks.length, total } };
    if (c.seq >= total || slots[c.seq]) return { partial: { have: chunks.length, total } };
    slots[c.seq] = c;
  }
  const have = slots.filter(Boolean).length;
  if (have < total) return { partial: { have, total } };
  const body = new Uint8Array(slots.reduce((n, s) => n + s.data.length, 0));
  let off = 0;
  for (const s of slots) { body.set(s.data, off); off += s.data.length; }
  return { body };
}

/* ------------------------------------------------ init / network UI */
(async function init() {
  try {
    const r = await fetch("/api/health", { signal: AbortSignal.timeout(1500) });
    const d = await r.json();
    serverMode = d.status === "ok" && d.regtest;
  } catch { serverMode = false; }
  if (!serverMode) {
    document.querySelector('#network option[value="regtest"]').remove();
  } else {
    $("network").value = "regtest";
    $("modePill").textContent = "local server · regtest available";
  }

  const q = new URLSearchParams(location.search);
  const netParam = q.get("network");
  const addr = (q.get("address") || "").trim();
  if (netParam && API[netParam]) {
    if (document.querySelector(`#network option[value="${netParam}"]`)) {
      $("network").value = netParam;
    } else {
      log($("viewLog"), `network "${netParam}" requested but no local server detected`, "err");
    }
  }
  if (addr) {
    $("address").value = addr;
    loadNotes();
  }
})();

$("network").addEventListener("change", () => {
  $("notes").textContent = "";
  $("notesHeader").textContent = "Enter an address and load.";
});

/* -------------------------------------------- scan chain → notes */
// Port of notes-core extract_notes (bundle.rs): filter to txs that spend
// from the address (spoof resistance — anyone can send OP_RETURNs *to* an
// address), decode PNTE envelopes, group chunks by note_id across txs.
async function loadNotes() {
  const address = $("address").value.trim();
  const logEl = $("viewLog");
  logEl.textContent = "";
  $("notes").textContent = "";
  if (!address) return log(logEl, "Enter the notes address first.", "err");
  $("loadBtn").disabled = true;
  $("notesHeader").textContent = "Loading…";
  try {
    log(logEl, `Scanning ${address} on ${net()}…`);
    const txs = await fullHistory(address, logEl);

    const byId = new Map();       // noteId → pending note
    let foreign = 0, nonPnte = 0, noteTxs = 0;
    for (const t of txs) {
      const payloads = t.vout
        .filter((o) => o.scriptpubkey_type === "op_return")
        .map((o) => opReturnPayload(o.scriptpubkey))
        .filter(Boolean);
      if (!payloads.length) continue;
      const spendsFromSelf = t.vin.some(
        (i) => i.prevout && i.prevout.scriptpubkey_address === address
      );
      if (!spendsFromSelf) { foreign++; continue; }
      noteTxs++;
      const txHeight = t.status.confirmed ? t.status.block_height : null;
      const txTime = t.status.confirmed ? t.status.block_time : null;
      for (const payloadHex of payloads) {
        const chunk = decodeEnvelope(hexToBytes(payloadHex));
        if (!chunk) { nonPnte++; continue; }
        chunk.dataHex = payloadHex.slice(24);   // for dedup below
        let entry = byId.get(chunk.noteId);
        if (!entry) {
          entry = { chunks: [], txids: [], height: null, blocktime: null };
          byId.set(chunk.noteId, entry);
        }
        // Drop exact duplicates (same chunk seen in overlapping txs).
        if (entry.chunks.some((c) => c.seq === chunk.seq && c.dataHex === chunk.dataHex)) continue;
        entry.chunks.push(chunk);
        if (!entry.txids.includes(t.txid)) entry.txids.push(t.txid);
        // A note's height is its FIRST confirmation.
        if (txHeight != null && (entry.height == null || txHeight < entry.height)) {
          entry.height = txHeight;
          entry.blocktime = txTime;
        }
      }
    }

    const notes = [];
    for (const [noteId, entry] of byId) {
      const asm = reassemble(entry.chunks);
      const priv = (entry.chunks[0].flags & FLAG_PRIVATE) !== 0;
      let text = null;
      if (asm.body && !priv) {
        try { text = new TextDecoder("utf-8", { fatal: true }).decode(asm.body); }
        catch { text = null; }
      }
      notes.push({
        noteId,
        private: priv,
        partial: asm.partial || null,
        bodyLen: asm.body ? asm.body.length : null,
        text,
        txids: entry.txids,
        height: entry.height,
        blocktime: entry.blocktime,
      });
    }
    // Newest first: unconfirmed on top, then height descending.
    const sortKey = (n) => (n.height == null ? Number.MAX_SAFE_INTEGER : n.height);
    notes.sort((a, b) => sortKey(b) - sortKey(a));

    render(notes);
    const bits = [`${notes.length} note(s)`, `${noteTxs} note tx(s)`, `${txs.length} txs scanned`];
    if (foreign) bits.push(`${foreign} foreign OP_RETURN tx(s) ignored`);
    if (nonPnte) bits.push(`${nonPnte} non-PNTE payload(s) ignored`);
    $("notesHeader").textContent = bits.join(" · ");
    log(logEl, "Done.", "ok");
    window.__cnViewer = { notes };
  } catch (e) {
    $("notesHeader").textContent = "Load failed.";
    log(logEl, `Failed: ${e.message}`, "err");
  } finally {
    $("loadBtn").disabled = false;
  }
}
$("loadBtn").addEventListener("click", loadNotes);
$("address").addEventListener("keydown", (e) => { if (e.key === "Enter") loadNotes(); });

/* ----------------------------------------------------------- render */
// Note text is arbitrary attacker-writable chain data — build everything
// with textContent, never innerHTML.
function render(notes) {
  const box = $("notes");
  box.textContent = "";
  if (!notes.length) {
    const p = document.createElement("p");
    p.className = "sub";
    p.style.margin = "10px 0 0";
    p.textContent = "No notes found at this address.";
    box.appendChild(p);
    return;
  }
  const explorer = API[net()].explorer;
  for (const n of notes) {
    const card = document.createElement("div");
    card.className = "note";

    const head = document.createElement("div");
    head.className = "note-head";
    const id = document.createElement("span");
    id.textContent = `note ${n.noteId}`;
    head.appendChild(id);
    const pill = (label) => {
      const s = document.createElement("span");
      s.className = "pill";
      s.textContent = label;
      head.appendChild(s);
    };
    pill(n.private ? "private" : "public");
    if (n.height == null) pill("unconfirmed");
    if (n.partial) pill(`partial ${n.partial.have}/${n.partial.total}`);
    card.appendChild(head);

    const body = document.createElement("div");
    body.className = "note-body";
    if (n.partial) {
      body.classList.add("dim");
      body.textContent = `Partial note — ${n.partial.have} of ${n.partial.total} chunks found on-chain.`;
    } else if (n.private) {
      body.classList.add("enc");
      body.textContent = "Encrypted (private) — readable only on the device.";
    } else if (n.text != null) {
      body.textContent = n.text;
    } else {
      body.classList.add("dim");
      body.textContent = `Public note but not valid UTF-8 (${n.bodyLen} bytes).`;
    }
    card.appendChild(body);

    const meta = document.createElement("div");
    meta.className = "note-meta";
    meta.textContent = n.height != null
      ? `height ${n.height} · ${new Date(n.blocktime * 1000).toLocaleString()} · `
      : "unconfirmed · ";
    n.txids.forEach((txid, i) => {
      if (i) meta.appendChild(document.createTextNode(", "));
      if (explorer) {
        const a = document.createElement("a");
        a.href = `${explorer}/tx/${txid}`;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = txid;
        meta.appendChild(a);
      } else {
        const c = document.createElement("code");
        c.textContent = txid;
        meta.appendChild(c);
      }
    });
    card.appendChild(meta);
    box.appendChild(card);
  }
}
</script>
</body>
</html>
